apiVersion: v1
kind: ConfigMap
metadata:
  name: alphaalgo-config
  namespace: alphaalgo
  labels:
    app: alphaalgo
data:
  # Application settings
  LOG_LEVEL: "INFO"
  PAPER_TRADING: "true"
  API_PORT: "8080"
  METRICS_PORT: "9090"
  
  # Database settings
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "alphaalgo"
  
  # Redis settings
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  
  # Trading settings
  MAX_POSITIONS: "10"
  MAX_DAILY_LOSS_PCT: "5"
  MAX_DRAWDOWN_PCT: "15"
  
  # Feature flags
  ENABLE_ADVANCED_EXECUTION: "true"
  ENABLE_ML_PREDICTIONS: "true"
  ENABLE_RISK_MONITORING: "true"
  ENABLE_NOTIFICATIONS: "true"
