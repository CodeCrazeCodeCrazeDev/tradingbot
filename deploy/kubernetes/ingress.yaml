apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alphaalgo-ingress
  namespace: alphaalgo
  labels:
    app: alphaalgo
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.alphaalgo.com
        - dashboard.alphaalgo.com
      secretName: alphaalgo-tls
  rules:
    - host: api.alphaalgo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alphaalgo-service
                port:
                  number: 8080
    - host: dashboard.alphaalgo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alphaalgo-network-policy
  namespace: alphaalgo
spec:
  podSelector:
    matchLabels:
      app: alphaalgo
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: alphaalgo
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: alphaalgo
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow external broker connections
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
