apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: alphaalgo
  labels:
    app: alphaalgo
    component: postgres
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: alphaalgo
      component: postgres
  template:
    metadata:
      labels:
        app: alphaalgo
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "alphaalgo"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alphaalgo-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "alphaalgo"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - alphaalgo
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - alphaalgo
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: alphaalgo
  labels:
    app: alphaalgo
    component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: alphaalgo
    component: postgres
