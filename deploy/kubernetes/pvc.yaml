apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alphaalgo-logs-pvc
  namespace: alphaalgo
  labels:
    app: alphaalgo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alphaalgo-data-pvc
  namespace: alphaalgo
  labels:
    app: alphaalgo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alphaalgo-state-pvc
  namespace: alphaalgo
  labels:
    app: alphaalgo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
