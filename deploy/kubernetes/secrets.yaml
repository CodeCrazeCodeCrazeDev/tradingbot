apiVersion: v1
kind: Secret
metadata:
  name: alphaalgo-secrets
  namespace: alphaalgo
  labels:
    app: alphaalgo
type: Opaque
stringData:
  # Database credentials (replace with actual values)
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  
  # Broker credentials
  MT5_LOGIN: "REPLACE_WITH_MT5_LOGIN"
  MT5_PASSWORD: "REPLACE_WITH_MT5_PASSWORD"
  MT5_SERVER: "REPLACE_WITH_MT5_SERVER"
  
  ALPACA_API_KEY: "REPLACE_WITH_ALPACA_KEY"
  ALPACA_API_SECRET: "REPLACE_WITH_ALPACA_SECRET"
  
  BINANCE_API_KEY: "REPLACE_WITH_BINANCE_KEY"
  BINANCE_API_SECRET: "REPLACE_WITH_BINANCE_SECRET"
  
  # Notification credentials
  TELEGRAM_BOT_TOKEN: "REPLACE_WITH_TELEGRAM_TOKEN"
  TELEGRAM_CHAT_ID: "REPLACE_WITH_CHAT_ID"
  
  SLACK_WEBHOOK_URL: "REPLACE_WITH_SLACK_WEBHOOK"
  
  EMAIL_SMTP_PASSWORD: "REPLACE_WITH_EMAIL_PASSWORD"
  
  # API keys
  JWT_SECRET_KEY: "REPLACE_WITH_JWT_SECRET"
  API_KEY: "REPLACE_WITH_API_KEY"
