apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaalgo-trading-bot
  namespace: alphaalgo
  labels:
    app: alphaalgo
    component: trading-bot
spec:
  replicas: 1  # Single instance for trading (avoid duplicate orders)
  strategy:
    type: Recreate  # Ensure only one instance runs at a time
  selector:
    matchLabels:
      app: alphaalgo
      component: trading-bot
  template:
    metadata:
      labels:
        app: alphaalgo
        component: trading-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: alphaalgo-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Init container to wait for dependencies
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      
      containers:
        - name: trading-bot
          image: alphaalgo/trading-bot:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: alphaalgo-config
            - secretRef:
                name: alphaalgo-secrets
          
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: data
              mountPath: /app/data
            - name: state
              mountPath: /app/state
      
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: alphaalgo-logs-pvc
        - name: data
          persistentVolumeClaim:
            claimName: alphaalgo-data-pvc
        - name: state
          persistentVolumeClaim:
            claimName: alphaalgo-state-pvc
      
      # Pod disruption budget
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - alphaalgo
                topologyKey: kubernetes.io/hostname
      
      # Graceful shutdown
      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: alphaalgo-service
  namespace: alphaalgo
  labels:
    app: alphaalgo
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: alphaalgo
    component: trading-bot

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alphaalgo-sa
  namespace: alphaalgo

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alphaalgo-pdb
  namespace: alphaalgo
spec:
  minAvailable: 0  # Allow disruption since we only have 1 replica
  selector:
    matchLabels:
      app: alphaalgo
      component: trading-bot

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alphaalgo-hpa
  namespace: alphaalgo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alphaalgo-trading-bot
  minReplicas: 1
  maxReplicas: 1  # Keep at 1 to avoid duplicate trading
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
