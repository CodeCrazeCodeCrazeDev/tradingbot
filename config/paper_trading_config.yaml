# Paper Trading Configuration
# Use this configuration for validation before going live

# ==============================================================================
# PAPER TRADING MODE SETTINGS
# ==============================================================================
mode: paper

paper_trading:
  enabled: true
  
  # Initial virtual capital
  initial_capital: 10000.0
  currency: USD
  
  # Simulation settings
  simulation:
    # Realistic slippage simulation (basis points)
    slippage_bps: 2.0
    
    # Commission per trade (percentage)
    commission_pct: 0.001
    
    # Spread simulation (pips)
    spread_simulation: true
    typical_spread_pips: 1.5
    
    # Fill probability (for limit orders)
    fill_probability: 0.95
    
    # Latency simulation (ms)
    simulated_latency_ms: 50
    
    # Market impact simulation
    market_impact_enabled: true
    impact_coefficient: 0.0001

# ==============================================================================
# VALIDATION REQUIREMENTS
# ==============================================================================
validation:
  # Minimum paper trading duration before live (days)
  min_paper_days: 7
  
  # Minimum number of trades
  min_trades: 50
  
  # Performance thresholds to pass validation
  thresholds:
    min_win_rate: 0.45
    min_profit_factor: 1.2
    max_drawdown: 0.15
    min_sharpe_ratio: 0.5
    max_consecutive_losses: 8
    min_avg_rr_ratio: 1.5
  
  # Statistical significance
  statistical:
    confidence_level: 0.95
    min_sample_size: 30

# ==============================================================================
# RISK CONTROLS (Paper Mode)
# ==============================================================================
risk:
  # Position sizing
  max_position_size_pct: 5.0
  max_risk_per_trade_pct: 1.0
  
  # Daily limits
  max_daily_trades: 20
  max_daily_loss_pct: 3.0
  
  # Drawdown controls
  max_drawdown_pct: 15.0
  drawdown_pause_threshold: 10.0
  
  # Correlation limits
  max_correlated_exposure_pct: 30.0

# ==============================================================================
# SYMBOLS FOR PAPER TRADING
# ==============================================================================
symbols:
  primary: EURUSD
  additional:
    - GBPUSD
    - USDJPY
    - AUDUSD
    - USDCAD

# ==============================================================================
# TIMEFRAMES
# ==============================================================================
timeframes:
  primary: M15
  analysis:
    - M5
    - M15
    - H1
    - H4

# ==============================================================================
# LOGGING & REPORTING
# ==============================================================================
logging:
  level: INFO
  log_all_trades: true
  log_signals: true
  log_risk_checks: true
  
reporting:
  # Generate reports
  daily_report: true
  weekly_report: true
  
  # Report output
  output_dir: reports/paper_trading
  
  # Metrics to track
  metrics:
    - total_trades
    - win_rate
    - profit_factor
    - sharpe_ratio
    - sortino_ratio
    - max_drawdown
    - avg_trade_duration
    - avg_profit_per_trade
    - best_trade
    - worst_trade
    - consecutive_wins
    - consecutive_losses
    - profit_by_hour
    - profit_by_day
    - profit_by_symbol

# ==============================================================================
# ALERTS (Paper Mode)
# ==============================================================================
alerts:
  enabled: true
  
  # Alert conditions
  conditions:
    drawdown_warning: 5.0
    drawdown_critical: 10.0
    consecutive_losses: 5
    daily_loss_warning: 2.0
    
  # Notification channels
  channels:
    console: true
    file: true
    email: false  # Disabled for paper trading
