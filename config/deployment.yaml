# AlphaAlgo 2.0 Deployment Configuration

# Environment settings
environment: production  # production, staging, development
debug: false
log_level: INFO

# System resources
resources:
  min_workers: 1
  max_workers: 8
  worker_step: 1
  auto_scaling: true
  gpu_enabled: true
  memory_limit: 16GB
  storage_limit: 100GB

# Performance thresholds
thresholds:
  latency:
    critical: 1000  # ms
    warning: 500
  error_rate:
    critical: 0.1  # 10%
    warning: 0.05
  success_rate:
    critical: 0.5  # 50%
    warning: 0.7
  drawdown:
    critical: 0.2  # 20%
    warning: 0.1

# Health check settings
health_check:
  interval: 60  # seconds
  timeout: 30
  retries: 3
  endpoints:
    - name: data_feed
      url: http://localhost:8000/health/data
    - name: model
      url: http://localhost:8000/health/model
    - name: database
      url: http://localhost:8000/health/db
    - name: api
      url: http://localhost:8000/health/api

# Monitoring configuration
monitoring:
  metrics_interval: 60  # seconds
  alert_channels:
    - type: email
      recipients: [admin@alphaalgo.com]
    - type: slack
      webhook: https://hooks.slack.com/services/xxx/yyy/zzz
  prometheus:
    enabled: true
    port: 9090
  grafana:
    enabled: true
    port: 3000

# Database settings
database:
  type: postgresql
  host: localhost
  port: 5432
  name: alphaalgo
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  pool_size: 20
  max_overflow: 10
  ssl_mode: require

# Cache settings
cache:
  type: redis
  host: localhost
  port: 6379
  db: 0
  password: ${REDIS_PASSWORD}
  ttl: 3600

# Model settings
model:
  checkpoint_dir: /models
  save_interval: 3600  # seconds
  batch_size: 64
  learning_rate: 0.0001
  device: cuda

# Trading settings
trading:
  symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
    - AUDUSD
  risk_limits:
    max_position_size: 1.0
    max_drawdown: 0.2
    max_leverage: 10.0
  execution:
    retry_attempts: 3
    timeout: 5  # seconds
    slippage_tolerance: 0.0001

# API settings
api:
  host: 0.0.0.0
  port: 8000
  workers: 4
  timeout: 30
  rate_limit:
    requests: 100
    window: 60  # seconds

# Security settings
security:
  ssl_enabled: true
  cert_file: /etc/ssl/certs/alphaalgo.crt
  key_file: /etc/ssl/private/alphaalgo.key
  allowed_ips:
    - 10.0.0.0/8
    - 192.168.0.0/16
  jwt:
    secret: ${JWT_SECRET}
    expiry: 3600  # seconds

# Backup settings
backup:
  enabled: true
  interval: 86400  # daily
  retention: 30  # days
  storage:
    type: s3
    bucket: alphaalgo-backups
    region: us-east-1

# Deployment stages
stages:
  - name: pre_deploy
    tasks:
      - name: run_tests
        command: python tests/run_tests.py
      - name: check_dependencies
        command: pip check
  
  - name: deploy
    tasks:
      - name: backup_data
        command: python scripts/backup.py
      - name: migrate_db
        command: alembic upgrade head
      - name: start_services
        command: supervisord -c supervisord.conf
  
  - name: post_deploy
    tasks:
      - name: health_check
        command: python scripts/health_check.py
      - name: smoke_test
        command: python scripts/smoke_test.py

# Rollback settings
rollback:
  enabled: true
  triggers:
    - type: health_check
      threshold: 3  # failures
    - type: error_rate
      threshold: 0.2  # 20%
  backup_restore:
    enabled: true
    max_attempts: 3

# Scaling policies
scaling:
  cpu:
    target: 0.7
    window: 300  # seconds
  memory:
    target: 0.8
    window: 300
  market_volume:
    threshold: 1.5
    window: 60

# Feature flags
features:
  advanced_rl: true
  multi_agent: true
  world_model: true
  multimodal: true
  explainability: true
  auto_scaling: true

# Dependencies
dependencies:
  python: "3.13"
  cuda: "12.0"
  pytorch: "2.2"
  transformers: "4.36"
  numpy: "1.26"
  pandas: "2.2"
