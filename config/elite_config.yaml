# Elite Trading Bot Configuration

# General settings
symbols: ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'TSLA', 'BTC-USD', 'ETH-USD']
timeframes: ['1m', '5m', '15m', '1h', '4h', '1d']
cycle_interval_seconds: 60
account_size: 1000000  # $1M account

# Brain architecture configuration
brain_config:
  learning_rate: 0.02
  min_decision_interval_minutes: 5
  component_weights:
    market_regime: 0.15
    sentiment: 0.12
    alternative_data: 0.13
    multi_timeframe_rl: 0.15
    liquidity_holography: 0.10
    institutional_dna: 0.12
    volatility_impulse: 0.08
    fractal_momentum: 0.07
    multi_agent_rl: 0.08

# Dashboard configuration
dashboard_config:
  port: 8050
  update_interval: 5
  anomaly_detector:
    z_score_threshold: 3.0
    min_history_points: 10
    detection_methods: ['z_score', 'iqr', 'isolation_forest']

# Strategy configurations
alternative_data_strategy_config:
  symbols: ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'TSLA']
  timeframes: ['1h', '4h', '1d']
  account_size: 1000000
  risk_config:
    max_position_size: 0.1  # 10% max position
    max_risk_per_trade: 0.02  # 2% risk per trade

multi_timeframe_rl_strategy_config:
  symbols: ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'TSLA']
  timeframes: ['5m', '15m', '1h', '4h']
  account_size: 1000000
  risk_config:
    max_position_size: 0.15
    max_risk_per_trade: 0.02
  agent_config:
    learning_rate: 0.0003
    batch_size: 64
    num_epochs: 10
    update_frequency: 2048
    eval_frequency: 10

market_regime_strategy_config:
  symbols: ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'TSLA']
  timeframes: ['5m', '15m', '1h']
  account_size: 1000000
  risk_config:
    max_position_size: 0.12
    max_risk_per_trade: 0.02

# Component configurations
market_regime_config:
  lookback_periods: 100
  regime_thresholds:
    volatility_high: 0.02
    trend_strength: 0.6
    range_deviation: 0.03
  detection_methods: ['statistical', 'ml_based', 'volatility_based']

sentiment_config:
  api_keys:
    newsapi: "YOUR_NEWSAPI_KEY"
    twitter: 
      api_key: "YOUR_TWITTER_API_KEY"
      api_secret: "YOUR_TWITTER_API_SECRET"
  weights:
    news: 0.6
    social: 0.4
  thresholds:
    bullish: 0.2
    bearish: -0.2
    min_confidence: 0.5
    min_volume: 5

alternative_data_config:
  api_keys:
    alpha_vantage: "YOUR_ALPHA_VANTAGE_KEY"
    quandl: "YOUR_QUANDL_KEY"
  update_interval_minutes: 60
  data_sources: ['satellite', 'web_scraping', 'social_media', 'sec_filings']

multi_timeframe_rl_config:
  timeframes: ['1m', '5m', '15m', '1h', '4h', '1d']
  features: ['close', 'open', 'high', 'low', 'volume', 'rsi', 'macd', 'bb_upper', 'bb_lower', 'atr']
  window_size: 100
  max_position_size: 1.0
  risk_per_trade: 0.02
  model_dir: 'models'

liquidity_holography_config:
  depth_levels: 10
  update_frequency_seconds: 30
  visualization_enabled: true

institutional_dna_config:
  pattern_detection_threshold: 0.75
  min_pattern_length: 5
  max_pattern_length: 20
  model_path: 'models/institutional_dna_model.pkl'

volatility_impulse_config:
  lookback_periods: 20
  threshold_multiplier: 2.0
  smoothing_factor: 0.2

fractal_momentum_config:
  fractal_periods: [5, 13, 34, 89]
  momentum_periods: [14, 21, 50]
  divergence_threshold: 0.3

multi_agent_rl_config:
  agents: ['trend_follower', 'mean_reversion', 'breakout_trader', 'volatility_trader']
  consensus_threshold: 0.6
  agent_weights:
    trend_follower: 0.3
    mean_reversion: 0.25
    breakout_trader: 0.25
    volatility_trader: 0.2

digital_twin_config:
  simulation_runs: 100
  confidence_interval: 0.95
  risk_scenarios: ['normal', 'stress', 'extreme']

quantum_optimizer_config:
  optimization_method: 'quantum_annealing'
  shots: 1000
  backend: 'qiskit_aer'

blockchain_validator_config:
  blockchain_type: 'ethereum'
  validation_interval_minutes: 60
  storage_path: 'data/blockchain'

risk_manager_config:
  max_drawdown: 0.15  # 15% max drawdown
  max_position_size: 0.2  # 20% max position
  position_sizing_method: 'kelly'
  kelly_fraction: 0.5  # Half-Kelly for conservatism
  risk_per_trade: 0.02  # 2% risk per trade
  correlation_threshold: 0.7  # Threshold for correlated assets

market_impact_config:
  asset_type: 'equity'
  params:
    permanent_impact: 0.1
    temporary_impact: 0.3
    decay_rate: 0.2
    volatility: 0.01
    spread: 0.01
    adv_percentage: 0.03
