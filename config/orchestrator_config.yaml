# AlphaAlgo Orchestrator Configuration
# Master coordination system for multi-strategy trading

orchestrator:
  # Trading mode selection
  trading_mode: balanced  # Options: aggressive, balanced, conservative, defensive, scalping, swing, position
  
  # Position management
  max_positions: 5
  max_risk_per_trade: 0.02  # 2% max risk per trade
  max_portfolio_risk: 0.05  # 5% max total portfolio risk
  
  # Strategy coordination
  strategy_weights:
    trend_following: 0.3
    mean_reversion: 0.2
    momentum: 0.2
    breakout: 0.15
    volatility: 0.15
  
  # Signal aggregation
  min_signal_confidence: 0.6  # Minimum confidence to act on signal
  signal_aggregation_method: weighted_average  # Options: weighted_average, voting, ensemble
  
  # Timeframe coordination
  primary_timeframe: H1
  confirmation_timeframes: [M15, H4]
  
# Execution Engine Configuration
execution:
  # Algorithm selection
  default_algorithm: adaptive  # Options: market, limit, vwap, twap, adaptive, sniper, iceberg
  
  # VWAP settings
  vwap:
    participation_rate: 0.1  # 10% of volume
    max_deviation: 0.002  # 0.2% max price deviation
  
  # TWAP settings
  twap:
    time_slices: 10
    randomize_timing: true
  
  # Adaptive execution
  adaptive:
    urgency_threshold: 0.8  # High urgency = more aggressive
    market_impact_limit: 0.001  # 0.1% max market impact
  
  # Smart order routing
  smart_routing:
    enabled: true
    venue_selection: best_execution  # Options: best_execution, lowest_cost, fastest
    
  # Slippage management
  max_slippage: 0.001  # 0.1% max slippage tolerance
  slippage_monitoring: true

# ML Predictor Configuration
ml_predictor:
  enabled: true
  
  # Opportunity prediction
  opportunity_predictor:
    model_type: ensemble  # Options: ensemble, gradient_boosting, neural_network
    confidence_threshold: 0.65
    feature_importance_tracking: true
  
  # Success prediction
  success_predictor:
    enabled: true
    min_success_probability: 0.6
    risk_reward_weight: 0.7
  
  # Feature extraction
  features:
    technical_indicators: true
    market_microstructure: true
    sentiment_signals: true
    regime_indicators: true
    
  # Model updates
  online_learning: true
  update_frequency: daily
  retrain_threshold: 0.05  # Retrain if performance drops 5%

# Portfolio Risk Manager Configuration
risk_manager:
  # Position sizing
  position_sizing_method: kelly  # Options: fixed, kelly, optimal_f, risk_parity, volatility_based
  
  # Kelly Criterion settings
  kelly:
    fractional_kelly: 0.5  # Use half-Kelly for safety
    max_position_size: 0.1  # 10% max per position
  
  # Portfolio limits
  max_correlated_exposure: 0.5  # 50% max in correlated assets
  max_sector_exposure: 0.4  # 40% max per sector
  
  # Hedging
  hedging:
    enabled: true
    hedge_ratio_target: 0.3  # 30% portfolio hedged
    hedge_instruments: [VIX, inverse_etf]
  
  # Drawdown control
  drawdown_controller:
    max_drawdown: 0.15  # 15% max drawdown
    daily_loss_limit: 0.03  # 3% daily loss limit
    recovery_mode_threshold: 0.10  # Enter recovery at 10% drawdown
    
  # Risk metrics
  var_calculation:
    confidence_level: 0.95
    time_horizon: 1  # 1 day VaR
    method: historical  # Options: historical, parametric, monte_carlo

# Performance Tracker Configuration
performance:
  # Tracking settings
  track_metrics: true
  real_time_updates: true
  
  # Metrics to track
  metrics:
    - sharpe_ratio
    - sortino_ratio
    - calmar_ratio
    - max_drawdown
    - win_rate
    - profit_factor
    - average_win
    - average_loss
    - expectancy
  
  # Auto-optimization
  auto_optimize:
    enabled: true
    optimization_interval: 3600  # 1 hour
    optimization_method: bayesian  # Options: grid_search, random_search, bayesian
    
  # Performance attribution
  attribution_analysis: true
  component_tracking: true
  
  # Reporting
  daily_report: true
  weekly_summary: true
  report_path: logs/performance/

# Logging and Monitoring
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR
  log_trades: true
  log_signals: true
  log_decisions: true
  log_path: logs/orchestrator/
  
  # Performance logging
  log_performance_metrics: true
  metrics_interval: 300  # 5 minutes

# Safety Controls
safety:
  # Emergency controls
  emergency_stop_enabled: true
  max_consecutive_losses: 5
  pause_on_anomaly: true
  
  # Health checks
  health_check_interval: 60  # 1 minute
  auto_restart_on_error: false  # Require manual intervention
  
  # Validation
  pre_trade_validation: true
  post_trade_validation: true
  
# Feature Flags
features:
  enable_opportunity_predictor: true
  enable_success_predictor: true
  enable_portfolio_risk_manager: true
  enable_performance_tracker: true
  enable_auto_optimizer: true
  enable_smart_routing: true
