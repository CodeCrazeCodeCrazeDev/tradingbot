# Elite Trading Bot - Complete Configuration
# All 50 features configured and ready

# ============================================================================
# SURVIVAL CORE SETTINGS
# ============================================================================
survival_core:
  # Trading symbols
  symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
  
  # Data quality
  simulate_data: true  # Set to false for live data
  max_data_staleness_seconds: 5
  quarantine_dir: "data/quarantine"
  
  # Clock drift
  max_clock_drift_ms: 100
  ntp_check_interval: 300  # 5 minutes
  
  # Risk limits
  max_daily_loss: 1000
  max_position_size: 10000
  max_positions: 10
  
  # Monitoring
  monitoring:
    thresholds:
      cpu_usage: 80.0
      memory_usage: 80.0
      disk_usage: 90.0

# ============================================================================
# DASHBOARD SETTINGS
# ============================================================================
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  update_interval: 1  # seconds

# ============================================================================
# TELEGRAM BOT SETTINGS
# ============================================================================
telegram:
  enabled: false  # Enable when you have a token
  token: null  # Add your bot token here
  
  # User roles (user_id: role)
  user_roles:
    # Example:
    # 123456789: "admin"
    # 987654321: "operator"
    # 555555555: "viewer"

# ============================================================================
# RECONCILIATION SETTINGS
# ============================================================================
reconciliation:
  enabled: true
  interval: 300  # 5 minutes
  auto_correct_positions: true
  quantity_tolerance: 0.01  # 1%
  price_tolerance: 0.001    # 0.1%

# ============================================================================
# RISK BUDGET SETTINGS
# ============================================================================
risk_budget:
  total_risk_budget: 0.10  # 10% of portfolio
  allocation_method: "risk_parity"  # equal_weight, volatility_parity, risk_parity, performance_based, dynamic
  rebalance_interval: 3600  # 1 hour

# ============================================================================
# CORRELATION SETTINGS
# ============================================================================
correlation:
  correlation_window: 30  # days
  correlation_threshold: 0.7
  update_frequency: 3600  # 1 hour
  max_combined_exposure: 0.15  # 15% for correlated pairs

# ============================================================================
# PRE-TRADE CHECKS
# ============================================================================
pre_trade_checks:
  max_leverage: 10.0
  max_position_size_pct: 0.20  # 20% of portfolio
  max_positions_per_symbol: 1
  max_orders_per_minute: 10
  min_time_between_opposite_trades: 60  # seconds
  
  # Blacklist
  blacklisted_symbols: []
  
  # Trading windows (optional)
  trading_windows: {}
    # EURUSD:
    #   start: "08:00:00"
    #   end: "17:00:00"
  
  # Liquidity thresholds
  min_liquidity:
    min_volume: 1000
    max_spread_bps: 50

# ============================================================================
# DRAWDOWN LADDER
# ============================================================================
drawdown:
  d1_threshold: 0.05  # 5% - Pause new entries
  d2_threshold: 0.10  # 10% - Cut sizes 50%
  d3_threshold: 0.15  # 15% - Flatten book

# ============================================================================
# VAR/CVAR SETTINGS
# ============================================================================
var:
  confidence_level: 0.95
  max_var: 10000
  max_cvar: 15000

# ============================================================================
# FEATURE FLAGS
# ============================================================================
feature_flags:
  trading_enabled: true
  new_router: false
  experimental_ml: false
  advanced_analytics: true

# ============================================================================
# A/B TESTING
# ============================================================================
ab_testing:
  enabled: true
  strategies:
    - strategy_a
    - strategy_b

# ============================================================================
# HYPERPARAMETER TUNING
# ============================================================================
tuning:
  enabled: true
  optimization_interval: 86400  # 24 hours
  n_iterations: 50

# ============================================================================
# SESSION MANAGEMENT
# ============================================================================
sessions:
  respect_holidays: true
  session_specific_risk: true
  
  # Holidays (example)
  holidays:
    default:
      - "2025-01-01"  # New Year
      - "2025-12-25"  # Christmas

# ============================================================================
# HUMAN APPROVAL
# ============================================================================
approval:
  approval_threshold: 100000  # Orders > $100k require approval
  timeout_seconds: 300  # 5 minutes

# ============================================================================
# REGIME DETECTION
# ============================================================================
regime:
  lookback_period: 100
  volatility_threshold: 2.0

# ============================================================================
# OVERNIGHT RISK
# ============================================================================
overnight:
  max_overnight_exposure: 0.5  # 50% of normal
  auto_trim: true
  trim_time: "16:00:00"  # 4 PM

# ============================================================================
# TRANSACTION COSTS
# ============================================================================
cost_model:
  fee_schedules:
    default:
      maker: 0.1  # bps
      taker: 0.2
  slippage_params:
    base_slippage_bps: 0.5
    volatility_multiplier: 2.0
  impact_params:
    permanent_impact_coeff: 0.1
    temporary_impact_coeff: 0.5

# ============================================================================
# RATE LIMITS
# ============================================================================
rate_limits:
  binance:
    requests_per_second: 10
    burst_size: 20
  kraken:
    requests_per_second: 5
    burst_size: 10

# ============================================================================
# RETRY POLICY
# ============================================================================
retry_policy:
  max_attempts: 3
  base_delay: 1.0
  max_delay: 30.0
  time_budget: 60

# ============================================================================
# CHECKPOINTING
# ============================================================================
checkpoint:
  checkpoint_dir: "data/checkpoints"
  interval: 60  # 1 minute
  max_checkpoints: 10

# ============================================================================
# NOTIFICATIONS
# ============================================================================
notifications:
  telegram:
    enabled: false
    chat_id: null
  
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    from_email: null
    to_emails: []
    password: null
  
  throttling:
    cooldown: 300  # 5 minutes

# ============================================================================
# LOGGING
# ============================================================================
logging:
  level: "INFO"
  file: "logs/trading_bot.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5
  structured: true
  trace_ids: true

# ============================================================================
# KUBERNETES (for deployment)
# ============================================================================
k8s:
  liveness_probe: "/health/live"
  readiness_probe: "/health/ready"
  graceful_shutdown_timeout: 30
