# Testing Configuration - Small Position Testing
# Use this configuration for initial live trading tests with minimal risk

trading:
  mode: "live"  # Set to "paper" for paper trading
  symbol: "EURUSD"
  timeframe: "1H"
  
  # SMALL POSITION TESTING - Start with minimal risk
  test_mode: true
  max_positions: 1  # Only 1 position at a time during testing
  
risk:
  # CONSERVATIVE RISK LIMITS FOR TESTING
  max_lot_size: 0.01  # MICRO LOT - $0.10 per pip
  min_lot_size: 0.01
  max_drawdown: 0.05  # 5% maximum drawdown
  risk_per_trade: 0.005  # 0.5% risk per trade (very conservative)
  
  # Stop loss and take profit
  stop_loss_pips: 30  # Tight stop loss for testing
  take_profit_pips: 60  # 2:1 risk-reward ratio
  
  # Position limits
  max_daily_trades: 3  # Maximum 3 trades per day during testing
  max_daily_loss: 0.02  # Stop trading if 2% daily loss
  max_open_positions: 1  # Only 1 position at a time
  
  # Emergency controls
  emergency_stop_loss: 0.10  # Emergency stop at 10% loss
  circuit_breaker_enabled: true
  
strategy:
  name: "conservative_test"
  
  # Conservative entry criteria
  min_signal_confidence: 0.7  # Higher confidence required
  require_multi_timeframe_confirmation: true
  
  # Exit strategy
  use_trailing_stop: true
  trailing_stop_activation: 20  # Activate after 20 pips profit
  trailing_stop_distance: 15  # Trail by 15 pips
  
  # Filters
  avoid_news_events: true
  avoid_high_volatility: true
  max_spread_pips: 2  # Don't trade if spread > 2 pips

execution:
  # Paper trading simulation settings
  paper_trading: false  # Set to true for paper trading
  
  # Execution controls
  slippage_tolerance: 1  # Maximum 1 pip slippage
  max_execution_time: 5  # Maximum 5 seconds to execute
  
  # Order validation
  validate_before_execution: true
  require_confirmation: true  # Require manual confirmation (optional)

monitoring:
  # Enhanced monitoring during testing
  log_level: "DEBUG"
  log_all_signals: true
  log_all_decisions: true
  
  # Real-time alerts
  enable_alerts: true
  alert_on_trade: true
  alert_on_error: true
  alert_on_daily_limit: true
  
  # Performance tracking
  track_every_trade: true
  generate_daily_report: true
  
  # Health checks
  health_check_interval: 60  # Check every minute
  auto_restart_on_error: false  # Manual restart during testing

alerts:
  # Telegram alerts (configure your bot token)
  telegram:
    enabled: true
    bot_token: ""  # Add your Telegram bot token
    chat_id: ""  # Add your chat ID
    
  # Email alerts
  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    from_email: ""
    to_email: ""
    password: ""

testing:
  # Testing phase configuration
  phase: "initial"  # initial, validation, scaling
  
  # Initial phase (Days 1-2): Micro lots, max 3 trades/day
  initial:
    duration_hours: 48
    max_lot_size: 0.01
    max_daily_trades: 3
    
  # Validation phase (Days 3-5): Small lots, max 5 trades/day
  validation:
    duration_hours: 72
    max_lot_size: 0.05
    max_daily_trades: 5
    
  # Scaling phase (Days 6+): Normal lots, normal limits
  scaling:
    max_lot_size: 0.10
    max_daily_trades: 10
  
  # Success criteria to move to next phase
  success_criteria:
    min_win_rate: 0.55  # 55% win rate
    min_profit_factor: 1.5  # 1.5 profit factor
    max_drawdown: 0.05  # Less than 5% drawdown
    min_trades: 10  # At least 10 trades completed

# Data sources
data:
  primary_source: "mt5"
  backup_source: "alpha_vantage"
  cache_enabled: true
  cache_ttl: 60  # Cache for 1 minute

# Logging
logging:
  level: "DEBUG"
  file: "logs/testing_bot.log"
  rotation: "50 MB"
  retention: "30 days"
  
  # Separate logs for testing
  trade_log: "logs/testing_trades.log"
  error_log: "logs/testing_errors.log"
  performance_log: "logs/testing_performance.log"

# Safety checks
safety:
  # Pre-trade validation
  validate_balance: true
  validate_margin: true
  validate_connection: true
  
  # Position checks
  check_existing_positions: true
  prevent_duplicate_orders: true
  
  # Market checks
  check_market_hours: true
  check_spread: true
  check_volatility: true
  
  # System checks
  check_memory_usage: true
  check_cpu_usage: true
  max_memory_mb: 1000
  max_cpu_percent: 80

# Notes for testing
notes: |
  TESTING PHASE GUIDELINES:
  
  1. START SMALL: Begin with 0.01 lots (micro lots)
  2. MONITOR CLOSELY: Check every 2-4 hours for first 48 hours
  3. VERIFY EXECUTION: Ensure orders execute as expected
  4. CHECK LOGS: Review logs daily for any issues
  5. TRACK PERFORMANCE: Monitor win rate, profit factor, drawdown
  
  SUCCESS CRITERIA TO INCREASE POSITION SIZE:
  - At least 10 trades completed
  - Win rate > 55%
  - Profit factor > 1.5
  - Maximum drawdown < 5%
  - No critical errors
  
  EMERGENCY PROCEDURES:
  - If daily loss > 2%, bot stops automatically
  - If drawdown > 10%, emergency stop triggered
  - Manual override available via stop_trading() command
  
  CONTACT:
  - Monitor Telegram alerts
  - Check logs in /logs directory
  - Review daily performance reports
