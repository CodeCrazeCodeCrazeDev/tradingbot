# CI/CD Pipeline for Test Coverage
# Runs tests and enforces coverage gates

name: Test Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  MIN_COVERAGE_CRITICAL: 90
  MIN_COVERAGE_IMPORTANT: 80
  MIN_COVERAGE_OVERALL: 70

jobs:
  # ============================================================================
  # UNIT TESTS
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout pytest-xdist hypothesis
      
      - name: Run unit tests
        run: |
          pytest tests/test_critical_100_percent_coverage.py \
                 tests/test_critical_validation_signals_coverage.py \
                 tests/test_mutation_quality.py \
                 -v --timeout=300 \
                 --junitxml=test-results/unit-tests.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout
      
      - name: Run integration tests
        run: |
          pytest tests/test_edge_cases_integration.py \
                 tests/test_realtime_data_integration.py \
                 -v --timeout=300 \
                 --junitxml=test-results/integration-tests.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/

  # ============================================================================
  # COVERAGE ANALYSIS
  # ============================================================================
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage[toml]
      
      - name: Run tests with coverage
        run: |
          coverage run -m pytest tests/test_critical_100_percent_coverage.py \
                                  tests/test_critical_validation_signals_coverage.py \
                                  tests/test_edge_cases_integration.py \
                                  tests/test_mutation_quality.py \
                                  tests/test_realtime_data_integration.py \
                                  --timeout=300
      
      - name: Generate coverage report
        run: |
          coverage report --include="trading_bot/risk/*,trading_bot/execution/*,trading_bot/validation/*,trading_bot/signals/*"
          coverage xml -o coverage.xml
          coverage html -d coverage-html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
      
      - name: Check critical module coverage
        run: |
          echo "Checking critical module coverage..."
          CRITICAL_COV=$(coverage report --include="trading_bot/risk/position_size_calculator.py,trading_bot/risk/kelly_criterion.py,trading_bot/risk/circuit_breaker.py,trading_bot/risk/drawdown_protector.py,trading_bot/risk/var_engine.py,trading_bot/execution/trade_executor.py,trading_bot/validation/data_validator.py,trading_bot/signals/signal_lifecycle.py" | tail -1 | awk '{print $NF}' | tr -d '%')
          echo "Critical module coverage: ${CRITICAL_COV}%"
          if [ "${CRITICAL_COV}" -lt "${{ env.MIN_COVERAGE_CRITICAL }}" ]; then
            echo "❌ Critical module coverage ${CRITICAL_COV}% is below minimum ${MIN_COVERAGE_CRITICAL}%"
            exit 1
          fi
          echo "✅ Critical module coverage meets requirements"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================================
  # PROPERTY-BASED TESTS
  # ============================================================================
  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest hypothesis
      
      - name: Run property-based tests
        run: |
          pytest tests/test_property_based_hypothesis.py \
                 -v --timeout=600 \
                 --hypothesis-seed=42 \
                 --junitxml=test-results/property-tests.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: property-test-results
          path: test-results/

  # ============================================================================
  # PERFORMANCE BENCHMARKS
  # ============================================================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark
      
      - name: Run benchmarks
        run: |
          pytest tests/test_performance_benchmarks.py \
                 -v --timeout=600 \
                 --junitxml=test-results/benchmark-tests.xml
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: test-results/

  # ============================================================================
  # ML MODULE TESTS
  # ============================================================================
  ml-tests:
    name: ML Module Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest scikit-learn
      
      - name: Run ML tests
        run: |
          pytest tests/test_ml_modules_coverage.py \
                 -v --timeout=300 \
                 --junitxml=test-results/ml-tests.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ml-test-results
          path: test-results/

  # ============================================================================
  # COVERAGE GATE
  # ============================================================================
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [coverage, property-tests, benchmarks, ml-tests]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
      
      - name: Check coverage gate
        run: |
          echo "✅ All coverage gates passed!"
          echo "- Unit tests: PASSED"
          echo "- Integration tests: PASSED"
          echo "- Property-based tests: PASSED"
          echo "- Performance benchmarks: PASSED"
          echo "- ML module tests: PASSED"
          echo "- Coverage requirements: MET"

  # ============================================================================
  # NIGHTLY FULL SUITE
  # ============================================================================
  nightly-full-suite:
    name: Nightly Full Test Suite
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout hypothesis
      
      - name: Run full test suite
        run: |
          pytest tests/ \
                 -v --timeout=600 \
                 --cov=trading_bot \
                 --cov-report=html:coverage-html \
                 --cov-report=xml:coverage.xml \
                 --junitxml=test-results/full-suite.xml
      
      - name: Upload full coverage report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-report
          path: coverage-html/
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-test-results
          path: test-results/
