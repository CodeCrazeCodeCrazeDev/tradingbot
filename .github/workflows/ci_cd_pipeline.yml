name: AlphaAlgo Production CI/CD Pipeline

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================
  # Stage 1: Code Quality & Linting
  # ==========================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install linters
      run: |
        pip install flake8 black isort mypy pylint
    
    - name: Run flake8
      run: flake8 trading_bot/ --max-line-length=120 --ignore=E501,W503,E203
      continue-on-error: true
    
    - name: Check black formatting
      run: black --check --diff trading_bot/
      continue-on-error: true
    
    - name: Check import sorting
      run: isort --check-only --diff trading_bot/
      continue-on-error: true
    
    - name: Run pylint
      run: pylint trading_bot/ --exit-zero --output-format=text > pylint-report.txt
      continue-on-error: true
    
    - name: Upload lint reports
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: |
          pylint-report.txt

  # ==========================================
  # Stage 2: Unit Tests
  # ==========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: alphaalgo
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: alphaalgo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-xdist hypothesis
    
    - name: Run unit tests
      env:
        DATABASE_URL: postgresql://alphaalgo:test123@localhost:5432/alphaalgo_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ -v --cov=trading_bot --cov-report=xml --cov-report=html -n auto --ignore=tests/integration
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  # ==========================================
  # Stage 3: Integration Tests
  # ==========================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: alphaalgo
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: alphaalgo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://alphaalgo:test123@localhost:5432/alphaalgo_test
        REDIS_URL: redis://localhost:6379/0
        PAPER_TRADING: "true"
      run: |
        pytest tests/integration/ -v --tb=short
      continue-on-error: true

  # ==========================================
  # Stage 4: Security Scan
  # ==========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Run Bandit security scan
      run: |
        pip install bandit[toml]
        bandit -r trading_bot/ -f json -o bandit-report.json --severity-level medium
      continue-on-error: true
    
    - name: Run Safety check
      run: |
        pip install safety
        safety check --full-report -r requirements.txt || true
    
    - name: Check for secrets with Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: bandit-report.json

  # ==========================================
  # Stage 5: Build Docker Image
  # ==========================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=
    
    - name: Build and push
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.production
        target: production
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  # ==========================================
  # Stage 6: Deploy to Staging
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.alphaalgo.com
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
    
    - name: Deploy to staging
      run: |
        kubectl set image deployment/alphaalgo-trading-bot \
          trading-bot=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n alphaalgo-staging
        kubectl rollout status deployment/alphaalgo-trading-bot -n alphaalgo-staging --timeout=300s
    
    - name: Run smoke tests
      run: |
        sleep 30
        curl -f https://staging.alphaalgo.com/health/live || exit 1

  # ==========================================
  # Stage 7: Deploy to Production
  # ==========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment:
      name: production
      url: https://api.alphaalgo.com
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
    
    - name: Create backup
      run: |
        kubectl exec -n alphaalgo deployment/alphaalgo-trading-bot -- \
          python -c "from trading_bot.persistence import create_backup; create_backup()" || true
    
    - name: Deploy to production
      run: |
        kubectl set image deployment/alphaalgo-trading-bot \
          trading-bot=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n alphaalgo
        kubectl rollout status deployment/alphaalgo-trading-bot -n alphaalgo --timeout=300s
    
    - name: Verify deployment
      run: |
        sleep 30
        curl -f https://api.alphaalgo.com/health/live || exit 1
        curl -f https://api.alphaalgo.com/health/ready || exit 1
    
    - name: Notify on success
      if: success()
      run: |
        echo "Deployment successful!"
        # Add Slack/Discord notification here
    
    - name: Rollback on failure
      if: failure()
      run: |
        kubectl rollout undo deployment/alphaalgo-trading-bot -n alphaalgo
        echo "Deployment failed, rolled back to previous version"

  # ==========================================
  # Stage 8: Performance Tests (Nightly)
  # ==========================================
  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest-benchmark
    
    - name: Run performance benchmarks
      run: |
        pytest tests/benchmarks/ -v --benchmark-json=benchmark-results.json
      continue-on-error: true
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark-results.json
