name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy bandit
    
    - name: Run Black
      run: black --check --line-length=100 trading_bot/
    
    - name: Run isort
      run: isort --check-only --profile black trading_bot/
    
    - name: Run Flake8
      run: flake8 trading_bot/ --max-line-length=100 --extend-ignore=E203,W503
    
    - name: Run MyPy
      run: mypy trading_bot/ --ignore-missing-imports
      continue-on-error: true
    
    - name: Run Bandit
      run: bandit -r trading_bot/ -ll
      continue-on-error: true

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-timeout
    
    - name: Run tests
      run: |
        pytest tests_new/ -v --cov=trading_bot --cov-report=xml --cov-report=term -m "unit or integration"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Run Safety check
      run: safety check --json
      continue-on-error: true
    
    - name: Run Bandit security scan
      run: bandit -r trading_bot/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json

  build:
    name: Build and Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
    
    - name: Build package
      run: python -m build
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist-packages
        path: dist/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run integration tests
      run: |
        pytest tests_new/integration/ -v -m integration
      continue-on-error: true

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-benchmark
    
    - name: Run performance tests
      run: |
        pytest tests_new/performance/ -v -m performance
        python scripts/run_benchmarks.py
      continue-on-error: true

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material
    
    - name: Build documentation
      run: mkdocs build
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site

  deepseek-validation:
    name: DeepSeek AI Validation
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run AI behavior validation
      run: |
        python -c "
        from trading_bot.ai_engineer import IntegratedSafeguardSystem
        from pathlib import Path
        
        safeguards = IntegratedSafeguardSystem(
            base_dir=Path('logs/safeguards'),
            sandbox_enabled=True,
            mode='engineer'
        )
        
        # Run randomized test challenges
        challenges = safeguards.randomize_test_challenges()
        print(f'Generated {len(challenges)} AI validation challenges')
        
        # Monitor runtime behavior
        metrics = safeguards.monitor_runtime_behavior()
        print(f'Runtime metrics: {metrics}')
        
        # Check for anomalies
        if metrics.get('anomalies'):
            print(f'WARNING: Anomalies detected: {metrics[\"anomalies\"]}')
            exit(1)
        "
    
    - name: Validate test coverage requirement
      run: |
        pytest tests/ --cov=trading_bot --cov-report=term --cov-fail-under=90

  dual-approval:
    name: Dual Approval Workflow
    runs-on: ubuntu-latest
    needs: [deepseek-validation]
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check PR approvals
      uses: actions/github-script@v7
      with:
        script: |
          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });
          
          const approvals = reviews.filter(r => r.state === 'APPROVED');
          
          if (approvals.length < 2) {
            core.setFailed('Requires dual approval (1 human + 1 verification script)');
          }
    
    - name: Verification script approval
      run: |
        python -c "
        from trading_bot.ai_engineer import IntegratedSafeguardSystem
        from pathlib import Path
        import sys
        
        safeguards = IntegratedSafeguardSystem(
            base_dir=Path('logs/safeguards'),
            sandbox_enabled=True
        )
        
        # Run compliance audit
        audit = safeguards.run_compliance_audit()
        
        if not audit.get('passed', False):
            print(f'Audit failed: {audit.get(\"issues\", [])}')
            sys.exit(1)
        
        print('Verification script approved')
        "

  safe-commit-policy:
    name: Safe Commit Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Check for trading logic changes
      run: |
        # Get changed files
        CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
        
        # Critical trading logic files
        CRITICAL_PATHS="trading_bot/risk/ trading_bot/execution/ trading_bot/cognitive_architecture/"
        
        # Check if any critical files changed
        for path in $CRITICAL_PATHS; do
          if echo "$CHANGED_FILES" | grep -q "$path"; then
            echo "::warning::Critical trading logic changed in $path - requires manual review"
            echo "CRITICAL_CHANGE=true" >> $GITHUB_ENV
          fi
        done
    
    - name: Block auto-merge for critical changes
      if: env.CRITICAL_CHANGE == 'true'
      run: |
        echo "::error::Trading logic changes detected - auto-merge blocked"
        exit 1

  rollback-validation:
    name: Rollback Validation
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create and test rollback snapshot
      run: |
        python -c "
        from trading_bot.ai_engineer import IntegratedSafeguardSystem
        from pathlib import Path
        
        safeguards = IntegratedSafeguardSystem(
            base_dir=Path('logs/safeguards'),
            sandbox_enabled=True
        )
        
        # Create snapshot
        snapshot_id = safeguards.create_rollback_snapshot('CI/CD test snapshot')
        print(f'Snapshot created: {snapshot_id}')
        
        # Verify checkpoint system
        status = safeguards.get_status()
        assert status['total_checkpoints'] > 0, 'No checkpoints created'
        
        print('Rollback system validated')
        "

  nightly-dry-run:
    name: Nightly Simulation Dry Run
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 0'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run simulation mode
      run: |
        python main.py --mode simulation --duration 3600 --max-trades 10
      timeout-minutes: 60
    
    - name: Analyze simulation results
      run: |
        python -c "
        import json
        from pathlib import Path
        
        # Load simulation results
        results_file = Path('logs/simulation_results.json')
        if results_file.exists():
            with open(results_file) as f:
                results = json.load(f)
            
            # Check for anomalies
            if results.get('errors', 0) > 0:
                print(f'WARNING: {results[\"errors\"]} errors in simulation')
            
            print(f'Simulation complete: {results.get(\"trades\", 0)} trades executed')
        "

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [lint, test, security, build, deepseek-validation, rollback-validation]
    if: always()
    
    steps:
    - name: Check job status
      run: |
        echo "Lint: ${{ needs.lint.result }}"
        echo "Test: ${{ needs.test.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Build: ${{ needs.build.result }}"
        echo "DeepSeek Validation: ${{ needs.deepseek-validation.result }}"
        echo "Rollback Validation: ${{ needs.rollback-validation.result }}"
