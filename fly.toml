# Fly.io deployment configuration
# Free tier: 3 shared-cpu-1x VMs, 256MB RAM each, 3GB persistent storage
# Deploy: fly launch -> fly deploy

app = "alphaalgo-trading-bot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  TRADING_BOT_MODE = "paper"
  PYTHONUNBUFFERED = "1"
  TRADING_BOT_LOG_LEVEL = "INFO"

[processes]
  bot = "python main.py --mode paper --symbol EURUSD --timeframe M15"
  api = "python -m trading_bot.api.api_server"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["api"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
