[pytest]
# Test discovery
testpaths = tests trading_bot/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output and reporting
addopts = 
    -v
    --tb=short
    --strict-markers
    --timeout=180
    --cov-fail-under=0

# Filter known deprecation warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning:tensorflow.*
    ignore::DeprecationWarning:tf_keras.*
    ignore::DeprecationWarning:keras.*
    ignore::FutureWarning:sklearn.*
    ignore::DeprecationWarning:numpy.*
    ignore::DeprecationWarning:pandas.*
    ignore::PendingDeprecationWarning
    ignore::UserWarning:faiss.*
    ignore:.*deprecated.*:DeprecationWarning
    ignore:.*will be removed.*:FutureWarning

# Test markers
markers =
    unit: mark a test as a unit test
    integration: mark a test as an integration test
    ml: mark a test related to ML functionality
    execution: mark a test related to execution algorithms
    emotional: mark a test related to emotional tracking
    end_to_end: mark a test as an end-to-end test
    slow: mark test as slow running
    asyncio: mark test as async
    broker: mark test requiring broker connection
    database: mark test requiring database
    network: mark test requiring network access

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage options
[coverage:run]
source = trading_bot
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
